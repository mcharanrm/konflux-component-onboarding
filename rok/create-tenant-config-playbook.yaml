---
- name: Generate manifests for Konflux tenant creation
  hosts: localhost
  gather_facts: off
  vars:
    index_start: "{{ starts_from | default(0) }}"
    index_end: "{{ ends_at | default(-1) }}"
    total_items_count: "{{ (index_end | int) - (index_start | int) }}"
    tenant_numbers: [327, 387, 468, 1108, 1337, 1408, 1409, 1435, 1449, 1582, 1583, 1585, 1586, 1588, 1589, 1590, 1591, 1592, 1593, 1594, 1597, 1598, 1600, 1602, 1604, 1608, 1609, 1610, 1611, 1612, 1615, 1616, 1618, 1619, 1620, 1621, 1624, 1626, 1627, 1628, 1630, 1634, 1635, 1636, 1637, 1638, 1640, 1641, 1643, 1644, 1645, 1648, 1826, 1871, 1874, 1877, 1878, 1880, 1992, 2049, 2053, 2058, 2070, 2149, 2150, 2151, 2153, 2155, 2156, 2157, 2160, 2162, 2165, 2166, 2167, 2169, 2172, 2173, 2174, 2175, 2178, 2180, 2181, 2182, 2185, 2186, 2187, 2188, 2190, 2192, 2194, 2195, 2196, 2197, 2198, 2199, 2202, 2203, 2204, 2205, 2208, 2209, 2210, 2211, 2212, 2215, 2217, 2222, 2223, 2226, 2228, 2229, 2231, 2232, 2237, 2238, 2243, 2244, 2245, 2258, 2344, 2399, 2402, 2404, 2405, 2411, 2412, 2413, 2414, 2415, 2416, 2417, 2418, 2419, 2420, 2421, 2422, 2423, 2424, 2425, 2426, 2427, 2428, 2429, 2430, 2431, 2438, 2439, 2440, 2442, 2445, 2457, 2458, 2470, 2471, 2473, 2476, 2482, 2485, 2489, 2496, 2497, 2510, 2642, 2739, 2775, 2816, 2817, 2818, 2819, 2821, 2822, 2823, 2825, 2826, 2827, 2828, 2829, 2830, 2831, 2832, 2833, 2834, 2835, 2836, 2837, 2838, 2839, 2840, 2842, 2843, 2844, 2946, 2964, 2965, 2966, 2968, 2969, 2970, 2971, 2972, 2973]
    prefix_name: "test-rhtap-"
    suffix_name: "-tenant"
  tasks:
  - name: Run pre-flight checks
    block:  
    - name: Validate input parameters
      ansible.builtin.assert:
        that:
        - total_items_count | int >= 0
        success_msg: "All Pre-flight Checks Passed"
  
  - name: Generate tenant names
    block:
    - name: Create list of Konflux tenant names
      ansible.builtin.set_fact:
        tenants_list: "{% set tenants = [] %}{% for item in range(index_start|int, index_end|int + 1) %}{% if item in tenant_numbers %}{{ tenants.append({'tenant_name': prefix_name + (item | string) + suffix_name }) }}{% endif %}{% endfor %}{{ tenants }}"

    - name: Debug generated tenant names
      ansible.builtin.debug:
        var: tenants_list
        verbosity: 1

  - name: Generate kustomize patches for tenant manifests
    block:
    - name: Create configuration directory for tenant
      ansible.builtin.file:
        path: tenants/{{ konflux_tenant_workspace_name }}
        state: directory
      vars:
        konflux_tenant_workspace_name: "{{ item.tenant_name }}"
      loop: "{{ tenants_list | list }}"
      loop_control:
        label: "{{ item.tenant_name }}"

    - name: Generate kustomize configuration for tenant
      ansible.builtin.template:
        src: templates/kustomize-konflux-tenants.yaml.j2
        dest: tenants/{{ konflux_tenant_workspace_name }}/kustomization.yaml
      vars:
        konflux_tenant_workspace_name: "{{ item.tenant_name }}"
      loop: "{{ tenants_list | list }}"
      loop_control:
        label: "{{ item.tenant_name }}"